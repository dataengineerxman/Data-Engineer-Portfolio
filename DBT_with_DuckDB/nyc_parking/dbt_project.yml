# NYC Parking Violations
# Data Transformation
name: 'nyc_parking'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'nyc_parking'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
# We are using a lakehouse-style layering:
# - bronze: raw-ish structures
# - silver: cleaned/typed/enriched transformations
# - gold: curated marts/metrics
models:
  nyc_parking:

    silver:
      +schema: silver
      +materialized: view

    gold:
      +schema: gold
      +materialized: table
